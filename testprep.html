<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Prep - Rift Math</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1020;
  color: #eaf2ff;
}

.header {
  padding: 20px;
  border-bottom: 1px solid rgba(120,180,255,0.2);
}

h1 {
  margin: 0;
  color: #7cc7ff;
}

.container {
  padding: 20px;
  max-width: 800px;
  margin: auto;
}

.question {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(120,180,255,0.15);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.answers button {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(120,180,255,0.2);
  background: rgba(255,255,255,0.03);
  color: white;
  cursor: default;
}

.timer {
  float: right;
  color: gold;
}
</style>
</head>

<body>

<div class="header">
  <h1>🧪 Test Prep <span class="timer">⏱ 25:00</span></h1>
</div>

<div class="container">

  <div class="question">
    <b>1. Solve: 2x + 6 = 14</b>

    <div class="answers">
      <button>x = 4</button>
      <button>x = 6</button>
      <button>x = 8</button>
      <button>x = 2</button>
    </div>
  </div>

  <div class="question">
    <b>2. What is the slope of y = 3x + 2?</b>

    <div class="answers">
      <button>2</button>
      <button>3</button>
      <button>1</button>
      <button>0</button>
    </div>
  </div>

  <div class="question">
    <b>3. Area of a triangle formula?</b>

    <div class="answers">
      <button>1/2 × b × h</button>
      <button>b × h</button>
      <button>2πr</button>
      <button>l × w</button>
    </div>
  </div>

</div>

</body>
</html>

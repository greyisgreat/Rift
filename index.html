<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Rift Math</title>

	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: radial-gradient(circle at top, #0b1020, #05060a);
			color: #eaf2ff;
		}

		/* TOP BAR */
		.header {
			background: rgba(20, 30, 60, 0.8);
			padding: 18px 24px;
			font-size: 22px;
			font-weight: bold;
			letter-spacing: 1px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			border-bottom: 1px solid rgba(120, 180, 255, 0.2);
		}

		.header span {
			color: #7cc7ff;
		}

		/* LAYOUT */
		.container {
			display: flex;
			height: calc(100vh - 70px);
		}

		/* SIDEBAR */
		.sidebar {
			width: 240px;
			background: rgba(15, 20, 40, 0.9);
			padding: 16px;
			border-right: 1px solid rgba(120, 180, 255, 0.15);
		}

		.nav-btn {
			display: block;
			width: 100%;
			padding: 12px;
			margin-bottom: 10px;
			background: rgba(255, 255, 255, 0.04);
			border: 1px solid rgba(120, 180, 255, 0.15);
			color: #cfe6ff;
			border-radius: 10px;
			cursor: pointer;
			text-align: left;
			transition: 0.15s;
		}

		.nav-btn:hover {
			background: rgba(120, 180, 255, 0.1);
			transform: translateX(3px);
		}

		/* MAIN AREA */
		.main {
			flex: 1;
			padding: 24px;
		}

		.card {
			background: rgba(255, 255, 255, 0.04);
			border: 1px solid rgba(120, 180, 255, 0.15);
			border-radius: 16px;
			padding: 18px;
			margin-bottom: 18px;
			backdrop-filter: blur(6px);
		}

		.title {
			font-size: 18px;
			margin-bottom: 10px;
			color: #7cc7ff;
		}

		/* GRID BUTTONS */
		.grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 12px;
		}

		.fake-btn {
			padding: 16px;
			border-radius: 12px;
			background: rgba(255, 255, 255, 0.05);
			border: 1px solid rgba(120, 180, 255, 0.15);
			text-align: center;
			cursor: default;
			opacity: 0.9;
		}

		.fake-btn:hover {
			background: rgba(120, 180, 255, 0.08);
		}

		/* REAL BUTTON */
		.real-btn {
			padding: 16px;
			border-radius: 12px;
			background: rgba(120, 180, 255, 0.15);
			border: 1px solid #7cc7ff;
			text-align: center;
			cursor: pointer;
			font-weight: bold;
			color: #eaf2ff;
			transition: 0.2s;
		}

		.real-btn:hover {
			background: rgba(120, 180, 255, 0.25);
			transform: scale(1.03);
		}
	</style>
</head>

<body>

	<div class="header">
		<div>⚡ Rift <span>Math</span></div>
		<div style="font-size:14px; opacity:0.8;">Student Dashboard</div>
	</div>

	<div class="container">

		<!-- SIDEBAR -->
		<div class="sidebar">
			<button class="nav-btn">🏠 Home</button>
			<button class="nav-btn">📘 Courses</button>
			<button class="nav-btn">📊 Grades</button>
			<button class="nav-btn">🧠 Practice</button>
			<button class="nav-btn">📅 Calendar</button>
			<button class="nav-btn">⚙ Settings</button>
			<button class="nav-btn">💬 Messages</button>
		</div>

		<!-- MAIN -->
		<div class="main">

			<div class="card">
				<div class="title">Welcome Back</div>
				<p>Access your assignments, quizzes, and test preparation below.</p>
			</div>

			<div class="card">
				<div class="title">Quick Tools</div>
				<div class="grid">
					<div class="fake-btn">Formula Sheet</div>
					<div class="fake-btn">Homework Help</div>
					<div class="fake-btn">AI Tutor</div>
					<div class="fake-btn">Graphing Tool</div>
					<div class="fake-btn">Study Mode</div>
					<div class="fake-btn">Flashcards</div>
				</div>
			</div>

			<div class="card">
				<div class="title">Assessments</div>
				<div class="grid">

					<!-- ONLY REAL FUNCTION -->
					<div class="real-btn" onclick="location.href='test-prep.html'">
						🧪 Test Prep
					</div>

					<div class="fake-btn">Unit 1 Quiz</div>
					<div class="fake-btn">Unit 2 Quiz</div>
					<div class="fake-btn">Benchmark Test</div>
					<div class="fake-btn">Final Exam</div>
					<div class="fake-btn">Review Pack</div>

				</div>
			</div>

		</div>
	</div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Rift Dashboard</title>

<style>
:root {
  --bg: #0b1020;
  --panel: #121a33;
  --panel2: #0f1730;
  --accent: #7cc7ff;
  --text: #eaf2ff;
  --muted: #9bb0d1;
}

* {
  box-sizing: border-box;
  font-family: system-ui, Arial, sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
}

/* LAYOUT */
.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: rgba(10, 15, 30, 0.95);
  border-right: 1px solid rgba(120, 180, 255, 0.15);
  padding: 18px;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: var(--accent);
  margin-bottom: 20px;
}

.nav button {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(120, 180, 255, 0.15);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text);
  cursor: pointer;
  text-align: left;
}

/* MAIN */
.main {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.search {
  width: 300px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(120, 180, 255, 0.2);
  background: rgba(255, 255, 255, 0.03);
  color: white;
  outline: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: linear-gradient(180deg, var(--panel), var(--panel2));
  border: 1px solid rgba(120, 180, 255, 0.15);
  border-radius: 14px;
  padding: 16px;
}

.card h3 {
  margin: 0 0 6px;
  color: var(--accent);
}

.small {
  font-size: 13px;
  color: var(--muted);
}

.bar {
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  margin-top: 10px;
}

.fill {
  height: 100%;
  width: 60%;
  background: var(--accent);
}

.section {
  margin-top: 25px;
}

.panel {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(120,180,255,0.12);
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">⚡ Rift Math</div>

    <div class="nav">
      <button>Dashboard</button>
      <button>Courses</button>
      <button onclick="go('prep')">Test Prep</button>
      <button onclick="go('grades')">Grades</button>
      <button>Assignments</button>
      <button>Settings</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="top">
      <h2>Dashboard</h2>
      <input class="search" placeholder="Search... (try r1ft31)">
    </div>

    <div class="grid">

      <div class="card">
        <h3>Algebra</h3>
        <div class="small">Course Progress</div>
        <div class="bar"><div class="fill"></div></div>
      </div>

      <div class="card">
        <h3>Geometry</h3>
        <div class="small">Course Progress</div>
        <div class="bar"><div class="fill" style="width:45%"></div></div>
      </div>

      <div class="card">
        <h3>Test Prep</h3>
        <div class="small">Exam readiness</div>
        <div class="bar"><div class="fill" style="width:70%"></div></div>
      </div>

    </div>

    <div class="section">
      <h3>Announcements</h3>
      <div class="panel">New test prep module unlocked.</div>
      <div class="panel">Geometry quiz due Friday.</div>
    </div>

  </div>
</div>

<script>
const ROUTES = {
  rift: "silly.html",
  prep: "test-prep.html",
  grades: "grades.html"
};

function go(page) {
  window.location.href = ROUTES[page];
}

/* SECRET CODE SYSTEM */
window.addEventListener("DOMContentLoaded", () => {

  const search = document.querySelector(".search");
  const code = "r1ft31";

  search.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {

      const val = search.value.trim();

      if (val === code) {
        search.value = "Access granted...";
        setTimeout(() => {
          window.location.href = ROUTES.rift;
        }, 500);
      } else {
        search.value = "";
        search.placeholder = "Access denied";
      }

    }
  });

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Game Launcher</title>

<style>
  body {
    margin: 0;
    font-family: "Comic Sans MS", cursive;
    background: linear-gradient(120deg, #ffd6e7, #fef08a);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .launcher {
    background: white;
    width: 420px;
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 20px 40px rgba(0,0,0,.25);
    animation: wobble 6s infinite alternate;
  }

  h1 {
    margin: 0 0 15px;
    color: hotpink;
    transform: rotate(-2deg);
  }

  input {
    width: 100%;
    padding: 12px;
    font-size: 1.1em;
    border-radius: 12px;
    border: 3px dashed hotpink;
    outline: none;
    margin-bottom: 10px;
  }

  .list {
    max-height: 260px;
    overflow-y: auto;
    text-align: left;
  }

  .game {
    padding: 10px 14px;
    margin-bottom: 6px;
    background: #fef08a;
    border-radius: 12px;
    cursor: pointer;
    transition: transform .15s, background .15s;
  }

  .game:hover {
    transform: scale(1.05);
    background: #ffd6e7;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }

  button {
    flex: 1;
    padding: 12px;
    font-size: 1.2em;
    border: none;
    border-radius: 20px;
    cursor: pointer;
  }

  .random { background: limegreen; }
  .last { background: deepskyblue; }

  @keyframes wobble {
    from { transform: rotate(-1deg); }
    to { transform: rotate(1deg); }
  }
</style>
</head>

<body>

<div class="launcher">
  <h1>🎲 CHAOS GAME LAUNCHER</h1>

  <input id="search" placeholder="Search your doom..." autocomplete="off">

  <div class="list" id="gameList"></div>

  <div class="buttons">
    <button class="random" onclick="randomGame()">🎲 Random</button>
    <button class="last" onclick="lastGame()">⏮ Last</button>
  </div>
</div>

<script>
const games = [
  "Silly things/buttongame.html",
  "Silly things/result.html",
  "Silly things/EaglercraftX_1.8.html",
  "Silly things/clicker.html",
  "Silly things/yohohoio/index.html",
  "Silly things/bitlife/index.html",
  "Silly things/cell-machine/index.html",
  "Silly things/motox3m/index.html",
  "Silly things/Space.html",
  "Silly things/slope/index.html",
  "Silly things/ropepolice/index.html",
  "Silly things/retrobowl/index.html",
  "Silly things/motox3m-winter/index.html",
  "Silly things/motox3m-spooky/index.html",
  "Silly things/motox3m-pool/index.html",
  "Silly things/kittencannon/index.html",
  "Silly things/interactivebuddy/index.html",
  "Silly things/geometrydash/index.html",
  "Silly things/flappy-bird/index.html",
  "Silly things/finalearth2/index.html",
  "Silly things/exo/index.html",
  "Silly things/ducklife1/index.html",
  "Silly things/ducklife2/index.html",
  "Silly things/ducklife3/index.html",
  "Silly things/draw-the-hill/index.html",
  "Silly things/doodle-jump/index.html",
  "Silly things/dogeminer/index.html",
  "Silly things/death-run-3d/index.html",
  "Silly things/deal-or-no-deal/index.html",
  "Silly things/chrome-dino/index.html",
  "Silly things/among-us/index.html",
  "Silly things/avalanche/index.html",
  "Silly things/backrooms/index.html",
  "Silly things/basketball-stars/index.html",
  "Silly things/bloonstd2/index.html"
];

const list = document.getElementById("gameList");
const search = document.getElementById("search");

function cleanName(path) {
  let p = path.split("/");
  let name = p.at(-1) === "index.html" ? p.at(-2) : p.at(-1).replace(".html","");
  return name.replace(/[-_]/g," ").replace(/\b\w/g,c=>c.toUpperCase());
}

function render(filter="") {
  list.innerHTML = "";
  games
    .filter(g => cleanName(g).toLowerCase().includes(filter))
    .forEach(g => {
      const div = document.createElement("div");
      div.className = "game";
      div.textContent = cleanName(g);
      div.onclick = () => launch(g);
      list.appendChild(div);
    });
}

function launch(path) {
  localStorage.setItem("lastGame", path);
  new Audio("https://www.soundjay.com/button/beep-07.wav").play();
  setTimeout(() => location.href = path, 300);
}

function randomGame() {
  launch(games[Math.floor(Math.random() * games.length)]);
}

function lastGame() {
  const last = localStorage.getItem("lastGame");
  if (last) launch(last);
  else alert("No last game. You are chaos-less.");
}

search.addEventListener("input", e =>
  render(e.target.value.toLowerCase())
);

search.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const first = document.querySelector(".game");
    if (first) first.click();
  }
});

render();
</script>

</body>
</html>

        function getMousePos(event) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
        }
        
        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
        }
        
        function isColorWalkable(hexColor) {
            if (hexColor === WALKABLE_COLOR) return true;
            
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hexColor);
            if (!result) return false;
            
            const r = parseInt(result[1], 16);
            const g = parseInt(result[2], 16);
            const b = parseInt(result[3], 16);
            
            // Target brown: #B97A57 (185, 122, 87)
            const tolerance = 25;
            return Math.abs(r - 185) <= tolerance && 
                   Math.abs(g - 122) <= tolerance && 
                   Math.abs(b - 87) <= tolerance;
        }
        
        // ===== MAP FUNCTIONS =====
        function createMap() {
            updateDebugInfo('🗺️ Creating procedural map...');
            
            // Clear canvas
            mapCtx.fillStyle = '#333';
            mapCtx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);
            
            // Set walkable color
            mapCtx.fillStyle = WALKABLE_COLOR;
            
            // Create main pathways
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Horizontal main path
            mapCtx.fillRect(50, centerY - 40, canvas.width - 100, 80);
            
            // Vertical main path
            mapCtx.fillRect(centerX - 40, 50, 80, canvas.height - 100);
            
            // Create rooms and areas
            const rooms = [
                { x: 80, y: 80, w: 180, h: 120 },
                { x: 540, y: 80, w: 180, h: 120 },
                { x: 80, y: 400, w: 180, h: 120 },
                { x: 540, y: 400, w: 180, h: 120 },
                { x: 320, y: 150, w: 160, h: 100 },
                { x: 320, y: 350, w: 160, h: 100 }
            ];
            
            rooms.forEach(room => {
                mapCtx.fillRect(room.x, room.y, room.w, room.h);
            });
            
            // Create connecting corridors
            const corridors = [
                { x: 260, y: centerY - 20, w: 60, h: 40 },
                { x: 480, y: centerY - 20, w: 60, h: 40 },
                { x: centerX - 20, y: 250, w: 40, h: 60 },
                { x: centerX - 20, y: 290, w: 40, h: 60 }
            ];
            
            corridors.forEach(corridor => {
                mapCtx.fillRect(corridor.x, corridor.y, corridor.w, corridor.h);
            });
            
            updateGridFromCanvas();
            updateDebugInfo('✅ Map created successfully');
        }
        
        function updateGridFromCanvas() {
            game.grid = [];
            let walkableCount = 0;
            
            for (let y = 0; y < GRID_HEIGHT; y++) {
                game.grid[y] = [];
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const worldX = Math.min(x * GRID_SIZE + GRID_SIZE / 2, canvas.width - 1);
                    const worldY = Math.min(y * GRID_SIZE + GRID_SIZE / 2, canvas.height - 1);
                    
                    try {
                        const imageData = mapCtx.getImageData(worldX, worldY, 1, 1);
                        const pixel = imageData.data;
                        const color = rgbToHex(pixel[0], pixel[1], pixel[2]);
                        const walkable = isColorWalkable(color);
                        
                        game.grid[y][x] = walkable ? 0 : 1;
                        if (walkable) walkableCount++;
                    } catch (error) {
                        game.grid[y][x] = 1;
                    }
                }
            }
            
            updateDebugInfo(`🔍 Grid updated: ${walkableCount} walkable cells`);
        }
        
        // ===== PATHFINDING SYSTEM =====
        function findPath(startX, startY, endX, endY) {
            const start = { x: Math.floor(startX / GRID_SIZE), y: Math.floor(startY / GRID_SIZE) };
            const end = { x: Math.floor(endX / GRID_SIZE), y: Math.floor(endY / GRID_SIZE) };
            
            // Boundary checks
            if (start.x < 0 || start.x >= GRID_WIDTH || start.y < 0 || start.y >= GRID_HEIGHT ||
                end.x < 0 || end.x >= GRID_WIDTH || end.y < 0 || end.y >= GRID_HEIGHT) {
                return [];
            }
            
            // Check if positions are walkable
            if (!game.grid[start.y] || !game.grid[end.y] || 
                game.grid[start.y][start.x] === 1 || game.grid[end.y][end.x] === 1) {
                return [];
            }
            
            // If start and end are the same
            if (start.x === end.x && start.y === end.y) {
                return [{ x: endX, y: endY }];
            }
            
            // A* Algorithm implementation
            const openSet = [];
            const closedSet = new Set();
            const cameFrom = new Map();
            const gScore = new Map();
            const fScore = new Map();
            
            const getKey = (x, y) => `${x},${y}`;
            const heuristic = (a, b) => Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
            
            // Initialize starting node
            const startKey = getKey(start.x, start.y);
            gScore.set(startKey, 0);
            fScore.set(startKey, heuristic(start, end));
            openSet.push({ ...start, f: fScore.get(startKey), g: gScore.get(startKey) });
            
            // Get neighbors with 8-directional movement
            const getNeighbors = (node) => {
                const neighbors = [];
                const directions = [
                    { x: -1, y: -1, cost: 1.414 }, { x: 0, y: -1, cost: 1 }, { x: 1, y: -1, cost: 1.414 },
                    { x: -1, y: 0, cost: 1 }, { x: 1, y: 0, cost: 1 },
                    { x: -1, y: 1, cost: 1.414 }, { x: 0, y: 1, cost: 1 }, { x: 1, y: 1, cost: 1.414 }
                ];
                
                for (const dir of directions) {
                    const newX = node.x + dir.x;
                    const newY = node.y + dir.y;
                    
                    if (newX >= 0 && newX < GRID_WIDTH && newY >= 0 && newY < GRID_HEIGHT) {
                        if (game.grid[newY] && game.grid[newY][newX] === 0) {
                            // Prevent corner cutting for diagonal moves
                            if (dir.cost > 1) {
                                const checkX1 = node.x + (dir.x === 0 ? 0 : dir.x);
                                const checkY1 = node.y;
                                const checkX2 = node.x;
                                const checkY2 = node.y + (dir.y === 0 ? 0 : dir.y);
                                
                                if (game.grid[checkY1] && game.grid[checkY1][checkX1] === 1) continue;
                                if (game.grid[checkY2] && game.grid[checkY2][checkX2] === 1) continue;
                            }
                            
                           
                                neighbors.push({ x: newX, y: newY, cost: dir.cost });
                        }
                    }
                }
                
                return neighbors;
            };
            
            // Main A* loop
            while (openSet.length > 0) {
                // Find node with lowest fScore
                let current = openSet[0];
                let currentIndex = 0;
                
                for (let i = 1; i < openSet.length; i++) {
                    if (openSet[i].f < current.f) {
                        current = openSet[i];
                        currentIndex = i;
                    }
                }
                
                openSet.splice(currentIndex, 1);
                const currentKey = getKey(current.x, current.y);
                closedSet.add(currentKey);
                
                // Check if we reached the goal
                if (current.x === end.x && current.y === end.y) {
                    const path = [];
                    let pathNode = current;
                    
                    while (pathNode) {
                        const worldX = pathNode.x * GRID_SIZE + GRID_SIZE / 2;
                        const worldY = pathNode.y * GRID_SIZE + GRID_SIZE / 2;
                        path.unshift({ x: worldX, y: worldY });
                        
                        const pathKey = getKey(pathNode.x, pathNode.y);
                        pathNode = cameFrom.get(pathKey);
                    }
                    
                    if (path.length > 1) {
                        path.shift(); // Remove starting position
                        path[path.length - 1] = { x: endX, y: endY }; // Set exact target
                    }
                    
                    // Store full path for visualization
                    const fullPath = [{ x: startX, y: startY }, ...path];
                    game.pathVisualization = smoothPath(fullPath);
                    
                    updateDebugInfo(`🧭 Path found with ${path.length} waypoints`);
                    return path;
                }
                
                // Check all neighbors
                const neighbors = getNeighbors(current);
                
                for (const neighbor of neighbors) {
                    const neighborKey = getKey(neighbor.x, neighbor.y);
                    
                    if (closedSet.has(neighborKey)) continue;
                    
                    const tentativeGScore = gScore.get(currentKey) + neighbor.cost;
                    
                    let inOpenSet = false;
                    let openSetIndex = -1;
                    
                    for (let i = 0; i < openSet.length; i++) {
                        if (openSet[i].x === neighbor.x && openSet[i].y === neighbor.y) {
                            inOpenSet = true;
                            openSetIndex = i;
                            break;
                        }
                    }
                    
                    if (!inOpenSet) {
                        const neighborGScore = tentativeGScore;
                        const neighborFScore = neighborGScore + heuristic(neighbor, end);
                        
                        gScore.set(neighborKey, neighborGScore);
                        fScore.set(neighborKey, neighborFScore);
                        cameFrom.set(neighborKey, current);
                        
                        openSet.push({
                            x: neighbor.x,
                            y: neighbor.y,
                            f: neighborFScore,
                            g: neighborGScore
                        });
                    } else if (tentativeGScore < gScore.get(neighborKey)) {
                        gScore.set(neighborKey, tentativeGScore);
                        fScore.set(neighborKey, tentativeGScore + heuristic(neighbor, end));
                        cameFrom.set(neighborKey, current);
                        
                        openSet[openSetIndex].f = fScore.get(neighborKey);
                        openSet[openSetIndex].g = gScore.get(neighborKey);
                    }
                }
            }
            
            updateDebugInfo('❌ No path found to target location');
            return [];
        }
        
        function smoothPath(path) {
            if (path.length <= 2) return path;
            
            const smoothed = [path[0]];
            
            for (let i = 1; i < path.length - 1; i++) {
                const prev = path[i - 1];
                const current = path[i];
                const next = path[i + 1];
                
                if (!hasLineOfSight(prev.x, prev.y, next.x, next.y)) {
                    smoothed.push(current);
                }
            }
            
            smoothed.push(path[path.length - 1]);
            
            if (smoothed.length < path.length) {
                updateDebugInfo(`🎯 Path smoothed: ${path.length} → ${smoothed.length} waypoints`);
            }
            
            return smoothed;
        }
        
        function hasLineOfSight(x1, y1, x2, y2) {
            const dx = Math.abs(x2 - x1);
            const dy = Math.abs(y2 - y1);
            const steps = Math.max(dx, dy);
            
            if (steps === 0) return true;
            
            const stepX = (x2 - x1) / steps;
            const stepY = (y2 - y1) / steps;
            
            for (let i = 0; i <= steps; i++) {
                const checkX = Math.round(x1 + stepX * i);
                const checkY = Math.round(y1 + stepY * i);
                
                const gridX = Math.floor(checkX / GRID_SIZE);
                const gridY = Math.floor(checkY / GRID_SIZE);
                
                if (gridX < 0 || gridX >= GRID_WIDTH || gridY < 0 || gridY >= GRID_HEIGHT) {
                    return false;
                }
                
                if (game.grid[gridY] && game.grid[gridY][gridX] === 1) {
                    return false;
                }
            }
            
            return true;
        }
        
        // ===== GAME LOGIC =====
        function updatePlayer() {
            if (game.moving && game.player.path.length > 0) {
                const target = game.player.path[game.player.pathIndex];
                
                if (target) {
                    const dx = target.x - game.player.x;
                    const dy = target.y - game.player.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance > game.player.speed) {
                        const moveX = (dx / distance) * game.player.speed;
                        const moveY = (dy / distance) * game.player.speed;
                        
                        game.player.x += moveX;
                        game.player.y += moveY;
                        game.player.rotation = Math.atan2(dy, dx);
                    } else {
                        game.player.x = target.x;
                        game.player.y = target.y;
                        game.player.pathIndex++;
                        
                        if (game.player.pathIndex >= game.player.path.length) {
                            game.moving = false;
                            game.player.path = [];
                            game.player.pathIndex = 0;
                            game.pathVisualization = [];
                            updateDebugInfo('🎯 Destination reached!');
                        }
                    }
                }
            }
            
            // Check quest progress and collectibles
            checkQuestProgress();
            checkCollectibles();
        }
        
        // ===== RENDERING FUNCTIONS =====
        function drawPathVisualization() {
            if (!game.showPath || game.pathVisualization.length === 0) return;
            
            ctx.save();
            
            // Draw path line
            if (game.pathVisualization.length > 1) {
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 4]);
                ctx.globalAlpha = 0.8;
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 10;
                
                ctx.beginPath();
                ctx.moveTo(game.player.x, game.player.y);
                
                for (let i = game.player.pathIndex; i < game.pathVisualization.length; i++) {
                    const point = game.pathVisualization[i];
                    ctx.lineTo(point.x, point.y);
                }
                
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.shadowBlur = 0;
            }
            
            // Draw waypoints
            for (let i = game.player.pathIndex; i < game.pathVisualization.length; i++) {
                const point = game.pathVisualization[i];
                const isNext = (i === game.player.pathIndex);
                const isLast = (i === game.pathVisualization.length - 1);
                
                ctx.globalAlpha = 0.9;
                
                if (isLast) {
                    // Target destination
                    const pulseSize = 12 + Math.sin(Date.now() * 0.008) * 3;
                    
                    ctx.fillStyle = '#ff4444';
                    ctx.shadowColor = '#ff4444';
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#ff6666';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, pulseSize, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.shadowBlur = 0;
                } else if (isNext) {
                    // Next waypoint
                    const pulseSize = 8 + Math.sin(Date.now() * 0.012) * 2;
                    
                    ctx.fillStyle = '#ffff00';
                    ctx.shadowColor = '#ffff00';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#ffff88';
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.6;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, pulseSize, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.shadowBlur = 0;
                } else {
                    // Regular waypoint
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            
            // Draw path info (only if dialog and quest log are not active)
            if (game.pathVisualization.length > 0 && !dialogSystem.active && !questSystem.showQuestLog) {
                const remaining = game.pathVisualization.length - game.player.pathIndex;
                const text = `Waypoints: ${remaining}/${game.pathVisualization.length}`;
                
                ctx.globalAlpha = 0.9;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(10, 10, 180, 25);
                
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(text, 15, 28);
            }
            
            ctx.restore();
        }
        
        function drawPlayer() {
            ctx.save();
            ctx.translate(game.player.x, game.player.y);
            
            if (game.player.rotation !== undefined) {
                ctx.rotate(game.player.rotation);
            }
            
            // Player body
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(0, 0, game.player.size, 0, Math.PI * 2);
            ctx.fill();
            
            // Direction indicator
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(game.player.size * 0.7, 0);
            ctx.lineTo(game.player.size * 0.3, -game.player.size * 0.4);
            ctx.lineTo(game.player.size * 0.3, game.player.size * 0.4);
            ctx.closePath();
            ctx.fill();
            
            // Player outline
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, game.player.size, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawHades() {
            ctx.save();
            ctx.translate(game.hades.x, game.hades.y);
            
            // Hades body
            ctx.fillStyle = '#660000';
            ctx.shadowColor = '#660000';
            ctx.shadowBlur = 20;
            ctx.fillRect(-30, -40, 60, 80);
            
            // Face
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffddaa';
            ctx.fillRect(-20, -30, 40, 30);
            
            // Eyes
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(-15, -25, 8, 8);
            ctx.fillRect(7, -25, 8, 8);
            
            // Crown/horns
            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.moveTo(-25, -40);
            ctx.lineTo(-15, -50);
            ctx.lineTo(-10, -40);
            ctx.lineTo(10, -40);
            ctx.lineTo(15, -50);
            ctx.lineTo(25, -40);
            ctx.closePath();
            ctx.fill();
            
            // Quest indicator
            if (questSystem.availableQuests.length > 0) {
                const time = Date.now() * 0.008;
                const bounce = Math.sin(time) * 2;
                
                ctx.fillStyle = '#ffff00';
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = 10;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('!', 0, -70 + bounce);
                ctx.shadowBlur = 0;
            }
            
            // Check interaction
            const dx = game.player.x - game.hades.x;
            const dy = game.player.y - game.hades.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance <= 60 && !dialogSystem.active) {
                const currentTime = Date.now();
                const timeSinceLastInteraction = currentTime - game.hades.lastInteractionTime;
                const isInCooldown = timeSinceLastInteraction < game.hades.cooldownDuration;
                
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                
                if (isInCooldown) {
                    const remainingTime = Math.ceil((game.hades.cooldownDuration - timeSinceLastInteraction) / 1000);
                    ctx.fillStyle = '#ff4444';
                    ctx.fillText(`Wait ${remainingTime}s`, 0, -60);
                } else {
                    ctx.fillStyle = '#ffaa00';
                    ctx.shadowColor = '#ffaa00';
                    ctx.shadowBlur = 5;
                    
                    if (questSystem.availableQuests.length > 0) {
                        ctx.fillText('💀 Click for Quest', 0, -60);
                    } else if (questSystem.activeQuests.length > 0) {
                        ctx.fillText('💀 Click to Chat', 0, -60);
                    } else {
                        ctx.fillText('💀 Click to interact', 0, -60);
                    }
                    
                    ctx.shadowBlur = 0;
                }
            }
            
            ctx.restore();
        }
        
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw map
            ctx.drawImage(mapCanvas, 0, 0);
            
            // Draw collectibles
            drawCollectibles();
            
            // Draw quest markers
            drawQuestMarkers();
            
            // Draw path visualization
            drawPathVisualization();
            
            // Draw characters
            drawHades();
            drawPlayer();
            
            // Draw UI elements
            drawDialog();
            drawQuestLog();
            
            // Draw grid overlay in paint mode
            if (game.paintMode) {
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                
                for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                
                for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
            
            // Draw player stats overlay (if not in dialog or quest log)
            if (!dialogSystem.active && !questSystem.showQuestLog && (questSystem.activeQuests.length > 0 || questSystem.completedQuests.length > 0)) {
                ctx.save();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(canvas.width - 200, 10, 190, 60);
                
                ctx.strokeStyle = '#9966cc';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width - 200, 10, 190, 60);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`Level: ${questSystem.playerLevel}`, canvas.width - 190, 30);
                ctx.fillText(`XP: ${questSystem.playerXP}`, canvas.width - 190, 45);
                ctx.fillText(`Gold: ${questSystem.playerGold}`, canvas.width - 190, 60);
                
                ctx.restore();
            }
        }
        
        // ===== PAINT SYSTEM =====
        function paintAtPosition(x, y) {
            if (!game.paintMode) return;
            
            const brushSize = 20;
            mapCtx.fillStyle = game.currentPaintColor;
            mapCtx.beginPath();
            mapCtx.arc(x, y, brushSize, 0, Math.PI * 2);
            mapCtx.fill();
            
            // Update grid in painted area
            updateGridFromCanvas();
        }
        
        // ===== EVENT HANDLERS =====
        function setupEventListeners() {
            // Canvas click handler
            canvas.addEventListener('click', (event) => {
                if (dialogSystem.active) {
                    if (dialogSystem.isQuestDialog && game.hades.currentQuestOffer) {
                        handleQuestChoice(dialogSystem.selectedChoice);
                    } else {
                        advanceDialog();
                    }
                    return;
                }
                
                if (questSystem.showQuestLog) {
                    questSystem.showQuestLog = false;
                    return;
                }
                
                if (game.paintMode) return;
                
                const pos = getMousePos(event);
                
                // Check Hades interaction
                const playerToHades = Math.sqrt(
                    Math.pow(game.player.x - game.hades.x, 2) + 
                    Math.pow(game.player.y - game.hades.y, 2)
                );
                
                const clickToHades = Math.sqrt(
                    Math.pow(pos.x - game.hades.x, 2) + 
                    Math.pow(pos.y - game.hades.y, 2)
                );
                
                // Interact with Hades if conditions are met
                if (playerToHades <= 60 && clickToHades <= 40) {
                    const currentTime = Date.now();
                    const timeSinceLastInteraction = currentTime - game.hades.lastInteractionTime;
                    
                    if (timeSinceLastInteraction >= game.hades.cooldownDuration) {
                        game.hades.lastInteractionTime = currentTime;
                        
                        // Check for available quests first
                        if (questSystem.availableQuests.length > 0) {
                            const randomQuest = questSystem.availableQuests[Math.floor(Math.random() * questSystem.availableQuests.length)];
                            offerQuest(randomQuest.id);
                            return;
                        }
                        
                        // Check for completed quests
                        const completableQuests = questSystem.activeQuests.filter(quest => 
                            quest.objectives.every(obj => obj.completed)
                        );
                        
                        if (completableQuests.length > 0) {
                            const quest = completableQuests[0];
                            startDialog({
                                speaker: quest.giver,
                                pages: quest.dialog.complete
                            });
                            return;
                        }
                        
                        // Regular dialog
                        const messages = [
                            ['💀 Hades: "Welcome to my domain, mortal!"', 'The underworld holds many secrets...', 'Explore wisely, and you may find great rewards.'],
                            ['💀 Hades: "Your pathfinding skills serve you well."', 'Few mortals navigate my realm so efficiently.', 'Perhaps you have potential after all.'],
                            ['💀 Hades: "The souls here whisper of your deeds."', 'Word travels fast in the underworld.', 'Continue your journey, brave one.'],
                            ['💀 Hades: "Even death cannot stop determination."', 'You remind me why mortals fascinate me so.', 'Carry on with your quest, wanderer.']
                        ];
                        
                        const randomDialog = messages[game.hades.dialogIndex % messages.length];
                        game.hades.dialogIndex++;
                        
                        startDialog({
                            speaker: 'HADES',
                            pages: randomDialog
                        });
                        
                        return;
                    } else {
                        const remainingTime = Math.ceil((game.hades.cooldownDuration - timeSinceLastInteraction) / 1000);
                        updateDebugInfo(`💀 Hades is contemplating... wait ${remainingTime} more seconds`);
                        return;
                    }
                }
                
                // Movement handling
                try {
                    const imageData = mapCtx.getImageData(pos.x, pos.y, 1, 1);
                    const pixel = imageData.data;
                    const color = rgbToHex(pixel[0], pixel[1], pixel[2]);
                    
                    if (!isColorWalkable(color)) {
                        updateDebugInfo('❌ Cannot move to non-walkable area!');
                        return;
                    }
                    
                    // Find path using A* algorithm
                    const path = findPath(game.player.x, game.player.y, pos.x, pos.y);
                    if (path.length > 0) {
                        game.player.path = path;
                        game.player.pathIndex = 0;
                        game.moving = true;
                        updateDebugInfo(`🚶 Moving to (${Math.round(pos.x)}, ${Math.round(pos.y)}) via ${path.length} waypoints`);
                    } else {
                        updateDebugInfo('❌ No valid path found to target location');
                    }
                    
                } catch (error) {
                    console.error('Error in movement:', error);
                    updateDebugInfo('⚠️ Error processing movement request');
                }
            });
            
            // Paint mode handlers
            canvas.addEventListener('mousedown', (event) => {
                if (!game.paintMode) return;
                
                const pos = getMousePos(event);
                game.isMouseDown = true;
                paintAtPosition(pos.x, pos.y);
            });
            
            canvas.addEventListener('mousemove', (event) => {
                if (!game.paintMode || !game.isMouseDown) return;
                
                const pos = getMousePos(event);
                paintAtPosition(pos.x, pos.y);
            });
            
            canvas.addEventListener('mouseup', () => {
                game.isMouseDown = false;
            });
            
            // Prevent context menu on right click
            canvas.addEventListener('contextmenu', (event) => {
                event.preventDefault();
            });
            
            // Button handlers
            document.getElementById('paintWalkable').addEventListener('click', () => {
                if (dialogSystem.active) return;
                game.currentPaintColor = WALKABLE_COLOR;
                updateDebugInfo('🟤 Paint mode: Walkable areas (brown)');
            });
            
            document.getElementById('paintWall').addEventListener('click', () => {
                if (dialogSystem.active) return;
                game.currentPaintColor = '#ff0000';
                updateDebugInfo('🔴 Paint mode: Walls (red)');
            });
            
            document.getElementById('togglePaint').addEventListener('click', (event) => {
                if (dialogSystem.active) return;
                game.paintMode = !game.paintMode;
                event.target.textContent = `🎨 Paint Mode: ${game.paintMode ? 'ON' : 'OFF'}`;
                event.target.style.background = game.paintMode ? '#4CAF50' : '#333';
                updateDebugInfo(`🎨 Paint mode: ${game.paintMode ? 'ENABLED' : 'DISABLED'}`);
                
                if (game.paintMode) {
                    updateDebugInfo('🖌️ Click and drag to paint. Use buttons to switch colors.');
                }
            });
            
            document.getElementById('togglePath').addEventListener('click', (event) => {
                if (dialogSystem.active) return;
                game.showPath = !game.showPath;
                event.target.textContent = `🛤️ Show Path: ${game.showPath ? 'ON' : 'OFF'}`;
                event.target.style.background = game.showPath ? '#00aa00' : '#666';
                updateDebugInfo(`🛤️ Path visualization: ${game.showPath ? 'ENABLED' : 'DISABLED'}`);
            });
            
            document.getElementById('toggleQuests').addEventListener('click', (event) => {
                if (dialogSystem.active) return;
                questSystem.showQuestLog = !questSystem.showQuestLog;
                event.target.textContent = `📜 Quest Log${questSystem.showQuestLog ? ': ON' : ''}`;
                event.target.style.background = questSystem.showQuestLog ? '#9966cc' : '#9966cc';
                updateDebugInfo(`📜 Quest log: ${questSystem.showQuestLog ? 'OPENED' : 'CLOSED'}`);
            });
            
            document.getElementById('resetMap').addEventListener('click', () => {
                if (dialogSystem.active) return;
                updateDebugInfo('🔄 Resetting map to default layout...');
                createMap();
                game.pathVisualization = [];
                game.moving = false;
                game.player.path = [];
                
                // Reset collectibles
                game.collectibles.forEach(collectible => {
                    collectible.collected = false;
                });
                
                updateDebugInfo('✅ Map reset complete');
            });
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (event) => {
                // Handle dialog advancement with spacebar or enter
                if (dialogSystem.active) {
                    if (event.key === ' ' || event.key === 'Enter' || event.key === 'z' || event.key === 'Z') {
                        event.preventDefault();
                        if (dialogSystem.isQuestDialog && game.hades.currentQuestOffer) {
                            handleQuestChoice(dialogSystem.selectedChoice);
                        } else {
                            advanceDialog();
                        }
                        return;
                    }
                    
                    // Handle quest choice selection
                    if (dialogSystem.isQuestDialog && game.hades.currentQuestOffer) {
                        if (event.key === 'ArrowUp') {
                            event.preventDefault();
                            dialogSystem.selectedChoice = Math.max(0, dialogSystem.selectedChoice - 1);
                            return;
                        }
                        if (event.key === 'ArrowDown') {
                            event.preventDefault();
                            dialogSystem.selectedChoice = Math.min(dialogSystem.questChoices.length - 1, dialogSystem.selectedChoice + 1);
                            return;
                        }
                    }
                    
                    // Skip typewriter effect with X key
                    if (event.key === 'x' || event.key === 'X') {
                        event.preventDefault();
                        if (dialogSystem.isTyping) {
                            dialogSystem.currentChar = dialogSystem.currentDialog[dialogSystem.currentPage].length;
                            dialogSystem.isTyping = false;
                            dialogSystem.canAdvance = true;
                        }
                        return;
                    }
                    return; // Prevent other keys during dialog
                }
                
                switch(event.key.toLowerCase()) {
                    case 'p':
                        document.getElementById('togglePaint').click();
                        break;
                    case 'v':
                        document.getElementById('togglePath').click();
                        break;
                    case 'q':
                        document.getElementById('toggleQuests').click();
                        break;
                    case 'r':
                        document.getElementById('resetMap').click();
                        break;
                    case 'escape':
                        if (questSystem.showQuestLog) {
                            questSystem.showQuestLog = false;
                            updateDebugInfo('📜 Quest log closed');
                        } else if (game.moving) {
                            game.moving = false;
                            game.player.path = [];
                            game.pathVisualization = [];
                            updateDebugInfo('⏹️ Movement cancelled');
                        }
                        break;
                    case 'h':
                        // Show help
                        updateDebugInfo('🎮 CONTROLS: Click=Move, P=Paint, V=Path, Q=Quests, R=Reset, ESC=Cancel');
                        updateDebugInfo('💬 DIALOG: Space/Enter/Z=Advance, X=Skip typing, ↑↓=Select choice');
                        break;
                }
            });
        }
        
        // ===== GAME LOOP =====
        function gameLoop() {
            updatePlayer();
            updateDialog();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ===== INITIALIZATION =====
        function initialize() {
            if (game.initialized) return;
            
            updateDebugInfo('🎮 Initializing Hades Project - Quest Edition...');
            updateDebugInfo('🎯 Features: A* Pathfinding, Quest System, Dialog System, Collectibles');
            updateDebugInfo('🎨 Controls: Click=Move, P=Paint, V=Path, Q=Quests, R=Reset, H=Help');
            
            // Add quest log button to controls
            const controls = document.querySelector('.controls');
            const questButton = document.createElement('button');
            questButton.id = 'toggleQuests';
            questButton.className = 'btn';
            questButton.style.background = '#9966cc';
            questButton.style.color = 'white';
            questButton.textContent = '📜 Quest Log';
            controls.appendChild(questButton);
            
            // Create initial map
            createMap();
            
            // Initialize quest system
            initializeQuests();
            
            // Setup all event listeners
            setupEventListeners();
            
            // Start game loop
            gameLoop();
            
            // Try to load external images (optional)
            tryLoadImages();
            
            game.initialized = true;
            updateDebugInfo('✅ Hades Project initialized successfully!');
            updateDebugInfo('🚀 Ready to explore the underworld and complete quests!');
            updateDebugInfo('💡 Press H for help with controls');
            
            // Show initial quest after a short delay
            setTimeout(() => {
                if (questSystem.availableQuests.length > 0) {
                    updateDebugInfo('💀 Hades has quests available! Approach him to begin your journey.');
                }
            }, 2000);
        }
        
        function tryLoadImages() {
            // Optional image loading for enhanced graphics
            const playerImage = new Image();
            const mapImage = new Image();
            const hadesImage = new Image();
            
            playerImage.onload = () => {
                updateDebugInfo('✅ Player sprite loaded');
                // Could enhance drawPlayer() function here
            };
            
            playerImage.onerror = () => {
                updateDebugInfo('ℹ️ Using default player graphics (sprite not found)');
            };
            
            mapImage.onload = () => {
                updateDebugInfo('✅ Map texture loaded');
                // Could replace procedural map here
                mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
                mapCtx.drawImage(mapImage, 0, 0, mapCanvas.width, mapCanvas.height);
                updateGridFromCanvas();
            };
            
            mapImage.onerror = () => {
                updateDebugInfo('ℹ️ Using procedural map (texture not found)');
            };
            
            hadesImage.onload = () => {
                updateDebugInfo('✅ Hades sprite loaded');
                // Could enhance drawHades() function here
            };
            
            hadesImage.onerror = () => {
                updateDebugInfo('ℹ️ Using default Hades graphics (sprite not found)');
            };
            
            // Attempt to load images
            playerImage.src = 'guy.png';
            mapImage.src = 'Map.png';
            hadesImage.src = 'Hades.png';
        }
        
        // ===== SAVE/LOAD SYSTEM (Optional Enhancement) =====
        function saveGameState() {
            const saveData = {
                player: {
                    x: game.player.x,
                    y: game.player.y
                },
                questSystem: {
                    playerLevel: questSystem.playerLevel,
                    playerXP: questSystem.playerXP,
                    playerGold: questSystem.playerGold,
                    activeQuests: questSystem.activeQuests,
                    completedQuests: questSystem.completedQuests,
                    availableQuests: questSystem.availableQuests
                },
                collectibles: game.collectibles.map(c => ({
                    id: c.id,
                    collected: c.collected
                })),
                hades: {
                    lastInteractionTime: game.hades.lastInteractionTime,
                    dialogIndex: game.hades.dialogIndex
                }
            };
            
            try {
                localStorage.setItem('hadesProjectSave', JSON.stringify(saveData));
                updateDebugInfo('💾 Game saved successfully!');
                return true;
            } catch (error) {
                updateDebugInfo('❌ Failed to save game: ' + error.message);
                return false;
            }
        }
        
        function loadGameState() {
            try {
                const saveData = localStorage.getItem('hadesProjectSave');
                if (!saveData) {
                    updateDebugInfo('ℹ️ No save data found');
                    return false;
                }
                
                const data = JSON.parse(saveData);
                
                // Restore player position
                game.player.x = data.player.x || game.player.x;
                game.player.y = data.player.y || game.player.y;
                
                // Restore quest system
                if (data.questSystem) {
                    questSystem.playerLevel = data.questSystem.playerLevel || 1;
                    questSystem.playerXP = data.questSystem.playerXP || 0;
                    questSystem.playerGold = data.questSystem.playerGold || 0;
                    questSystem.activeQuests = data.questSystem.activeQuests || [];
                    questSystem.completedQuests = data.questSystem.completedQuests || [];
                    questSystem.availableQuests = data.questSystem.availableQuests || questSystem.availableQuests;
                }
                
                // Restore collectibles
                if (data.collectibles) {
                    data.collectibles.forEach(savedCollectible => {
                        const collectible = game.collectibles.find(c => c.id === savedCollectible.id);
                        if (collectible) {
                            collectible.collected = savedCollectible.collected;
                        }
                    });
                }
                
                // Restore Hades state
                if (data.hades) {
                    game.hades.lastInteractionTime = data.hades.lastInteractionTime || 0;
                    game.hades.dialogIndex = data.hades.dialogIndex || 0;
                }
                
                updateDebugInfo('📁 Game loaded successfully!');
                return true;
            } catch (error) {
                updateDebugInfo('❌ Failed to load game: ' + error.message);
                return false;
            }
        }
        
        // Auto-save functionality
        function setupAutoSave() {
            setInterval(() => {
                if (game.initialized && !dialogSystem.active) {
                    saveGameState();
                }
            }, 30000); // Auto-save every 30 seconds
        }
        
        // Add save/load buttons (optional)
        function addSaveLoadButtons() {
            const controls = document.querySelector('.controls');
            
            const saveButton = document.createElement('button');
            saveButton.className = 'btn';
            saveButton.style.background = '#4CAF50';
            saveButton.style.color = 'white';
            saveButton.textContent = '💾 Save';
            saveButton.addEventListener('click', () => {
                if (!dialogSystem.active) {
                    saveGameState();
                }
            });
            
            const loadButton = document.createElement('button');
            loadButton.className = 'btn';
            loadButton.style.background = '#2196F3';
            loadButton.style.color = 'white';
            loadButton.textContent = '📁 Load';
            loadButton.addEventListener('click', () => {
                if (!dialogSystem.active) {
                    loadGameState();
                }
            });
            
            controls.appendChild(saveButton);
            controls.appendChild(loadButton);
        }
        
        // ===== ACHIEVEMENT SYSTEM (Bonus Feature) =====
        const achievementSystem = {
            achievements: [
                {
                    id: 'first_quest',
                    name: 'Getting Started',
                    description: 'Complete your first quest',
                    unlocked: false,
                    icon: '🏆'
                },
                {
                    id: 'bone_collector',
                    name: 'Bone Collector',
                    description: 'Collect 5 bone treats',
                    unlocked: false,
                    icon: '🦴',
                    progress: 0,
                    maxProgress: 5
                },
                {
                    id: 'soul_guide',
                    name: 'Soul Guide',
                    description: 'Help 3 lost souls find their way',
                    unlocked: false,
                    icon: '👻',
                    progress: 0,
                    maxProgress: 3
                },
                {
                    id: 'level_up',
                    name: 'Power Growth',
                    description: 'Reach level 3',
                    unlocked: false,
                    icon: '⭐'
                },
                {
                    id: 'explorer',
                    name: 'Underworld Explorer',
                    description: 'Walk 1000 pixels total',
                    unlocked: false,
                    icon: '🗺️',
                    progress: 0,
                    maxProgress: 1000
                }
            ],
            unlockedAchievements: []
        };
        
        function checkAchievements() {
            achievementSystem.achievements.forEach(achievement => {
                if (achievement.unlocked) return;
                
                let shouldUnlock = false;
                
                switch (achievement.id) {
                    case 'first_quest':
                        shouldUnlock = questSystem.completedQuests.length >= 1;
                        break;
                    case 'bone_collector':
                        const boneCount = game.collectibles.filter(c => c.type === 'bone_treat' && c.collected).length;
                        achievement.progress = boneCount;
                        shouldUnlock = boneCount >= achievement.maxProgress;
                        break;
                    case 'soul_guide':
                        const soulCount = game.collectibles.filter(c => c.type === 'lost_soul' && c.collected).length;
                        achievement.progress = soulCount;
                        shouldUnlock = soulCount >= achievement.maxProgress;
                        break;
                    case 'level_up':
                        shouldUnlock = questSystem.playerLevel >= 3;
                        break;
                    case 'explorer':
                        // This would need to be tracked during movement
                        shouldUnlock = achievement.progress >= achievement.maxProgress;
                        break;
                }
                
                if (shouldUnlock) {
                    unlockAchievement(achievement);
                }
            });
        }
        
        function unlockAchievement(achievement) {
            achievement.unlocked = true;
            achievementSystem.unlockedAchievements.push(achievement);
            
            updateDebugInfo(`🏆 ACHIEVEMENT UNLOCKED: ${achievement.name}`);
            updateDebugInfo(`${achievement.icon} ${achievement.description}`);
            
            // Visual notification could be added here
        }
        
        // Start the game when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                initialize();
                // Uncomment to enable save/load and auto-save
                // addSaveLoadButtons();
                // setupAutoSave();
                // loadGameState(); // Try to load saved game on startup
            });
        } else {
            initialize();
            // Uncomment to enable save/load and auto-save
            // addSaveLoadButtons();
            // setupAutoSave();
            // loadGameState(); // Try to load saved game on startup
        }
    </script>
</body>

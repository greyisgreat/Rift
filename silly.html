<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Game Launcher</title>

<style>
:root {
  --pink:#ff5fa2;
}

/* ===== RESET ===== */
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Comic Sans MS", cursive;
  background: transparent;
}

/* ===== BACKGROUND ===== */
.bg {
  position: fixed;
  inset: -50%;
  z-index: -2;
  pointer-events: none;
  background:
    repeating-linear-gradient(
      135deg,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 2px,
      transparent 2px,
      transparent 40px
    ),
    radial-gradient(circle at 30% 30%, #ff5fa222, transparent 40%),
    radial-gradient(circle at 70% 70%, #38bdf822, transparent 40%),
    linear-gradient(120deg, #0f0f1a, #1a1a2e);
  background-size: 300px 300px, 100% 100%, 100% 100%, 100% 100%;
  animation: bgScroll 40s linear infinite;
  transform: translate(var(--mx,0px), var(--my,0px));
}

@keyframes bgScroll {
  to { transform: translate(300px,300px); }
}

/* ===== PARTICLES ===== */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

.particle, .dust {
  position: absolute;
  border-radius: 50%;
}

.particle {
  width: 2px;
  height: 2px;
  background: white;
  opacity: .35;
  animation: drift linear infinite;
}

@keyframes drift {
  from { transform: translate(0,0); opacity: 0; }
  10% { opacity: .35; }
  to { transform: translate(240px,220px); opacity: 0; }
}

.dust {
  width: 6px;
  height: 6px;
  background: radial-gradient(circle, rgba(255,255,255,.6), transparent 70%);
  opacity: .25;
  animation: dustFloat linear infinite;
}

@keyframes dustFloat {
  from { transform: translate(0,0); opacity: 0; }
  10% { opacity: .25; }
  to { transform: translate(60px,-200px); opacity: 0; }
}

/* ===== LAYOUT ===== */
body {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== LAUNCHER ===== */
.launcher {
  width: 420px;
  padding: 22px;
  border-radius: 26px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(8px);
  box-shadow: 0 25px 50px rgba(0,0,0,.35);
}

h1 {
  margin: 0 0 14px;
  color: var(--pink);
  transform: rotate(-2deg);
}

input {
  width: 100%;
  padding: 12px;
  font-size: 1.05em;
  border-radius: 14px;
  border: 3px dashed var(--pink);
  outline: none;
  margin-bottom: 12px;
}

/* ===== GAME LIST (MINIMAL) ===== */
.list {
  max-height: 260px;
  overflow-y: auto;
  padding-right: 6px;
}

.list::-webkit-scrollbar {
  width: 6px;
}
.list::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,.15);
  border-radius: 10px;
}

.game {
  position: relative;
  padding: 10px 12px;
  margin: 4px 0;
  cursor: pointer;
  font-weight: 600;
  border-radius: 10px;
  transition: background .15s, transform .15s;
}

.game::before {
  content: "";
  position: absolute;
  left: 0;
  top: 20%;
  width: 4px;
  height: 60%;
  background: var(--pink);
  border-radius: 10px;
  opacity: 0;
}

.game:hover {
  background: rgba(0,0,0,.06);
  transform: translateX(4px);
}

.game:hover::before {
  opacity: 1;
}

/* ===== OUTLINED BUTTONS ===== */
.buttons {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

button {
  flex: 1;
  padding: 14px;
  font-size: 1.1em;
  font-weight: bold;
  border-radius: 22px;
  cursor: pointer;

  background: transparent;
  border: 3px solid currentColor;
  color: #111;

  transition: transform .12s, box-shadow .12s, background .12s;
}

.random { color: limegreen; }
.last { color: deepskyblue; }

button:hover {
  background: rgba(255,255,255,.35);
  box-shadow:
    0 0 0 4px rgba(0,0,0,.06),
    0 0 18px currentColor;
  transform: translateY(-2px);
}

button:active {
  transform: translateY(1px);
  box-shadow:
    0 0 0 2px rgba(0,0,0,.1),
    0 0 8px currentColor;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="particles" id="particles"></div>

<div class="launcher">
  <h1>🎲 CHAOS GAME LAUNCHER</h1>
  <input id="search" placeholder="Search your doom..." autocomplete="off">
  <div class="list" id="gameList"></div>
  <div class="buttons">
    <button class="random" onclick="randomGame()">🎲 Random</button>
    <button class="last" onclick="lastGame()">⏮ Last</button>
  </div>
</div>

<script>
/* ===== PARALLAX ===== */
const bg = document.getElementById("bg");
addEventListener("mousemove", e => {
  bg.style.setProperty("--mx", (e.clientX / innerWidth - .5) * 15 + "px");
  bg.style.setProperty("--my", (e.clientY / innerHeight - .5) * 15 + "px");
});

/* ===== PARTICLES ===== */
const particles = document.getElementById("particles");

for (let i=0;i<40;i++) {
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.top=Math.random()*100+"vh";
  p.style.animationDuration=20+Math.random()*20+"s";
  p.style.animationDelay=Math.random()*10+"s";
  particles.appendChild(p);
}

for (let i=0;i<25;i++) {
  const d=document.createElement("div");
  d.className="dust";
  d.style.left=Math.random()*100+"vw";
  d.style.top=100+Math.random()*50+"vh";
  d.style.animationDuration=30+Math.random()*30+"s";
  d.style.animationDelay=Math.random()*20+"s";
  particles.appendChild(d);
}

/* ===== GAME LOGIC ===== */
let games=[];
const listEl=document.getElementById("gameList");
const search=document.getElementById("search");

fetch("games.json")
  .then(r=>r.json())
  .then(j=>{games=j;render();})
  .catch(()=>alert("Failed to load games 😭"));

function cleanName(p){
  p=p.split("/");
  let n=p.at(-1)==="index.html"?p.at(-2):p.at(-1).replace(".html","");
  return n.replace(/[-_]/g," ").replace(/\b\w/g,c=>c.toUpperCase());
}

function render(f=""){
  listEl.innerHTML="";
  games.filter(g=>cleanName(g).toLowerCase().includes(f))
    .forEach(g=>{
      const d=document.createElement("div");
      d.className="game";
      d.textContent=cleanName(g);
      d.onclick=()=>launch(g);
      listEl.appendChild(d);
    });
}

function launch(p){
  localStorage.setItem("lastGame",p);
  setTimeout(()=>location.href=p,200);
}

function randomGame(){
  launch(games[Math.floor(Math.random()*games.length)]);
}

function lastGame(){
  const l=localStorage.getItem("lastGame");
  l?launch(l):alert("Chaos has no memory yet.");
}

search.addEventListener("input",e=>render(e.target.value.toLowerCase()));
search.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const g=document.querySelector(".game");
    if(g) g.click();
  }
});
</script>

</body>
</html>

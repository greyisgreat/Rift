<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chaos Game Launcher</title>

<style>
:root {
  --pink:#ff5fa2;
  --yellow:#fef08a;
}

/* ===== GENERAL ===== */
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden; /* FULL LOCK: NO SCROLLING */
  font-family: "Comic Sans MS", cursive;
  background: transparent;
}

/* ===== SCROLLING BACKGROUND ===== */
.bg {
  position: fixed;
  inset: -50%;
  z-index: -2;
  pointer-events: none;

  background:
    repeating-linear-gradient(
      135deg,
      rgba(255,255,255,0.04) 0px,
      rgba(255,255,255,0.04) 2px,
      transparent 2px,
      transparent 40px
    ),
    radial-gradient(circle at 30% 30%, #ff5fa222, transparent 40%),
    radial-gradient(circle at 70% 70%, #38bdf822, transparent 40%),
    linear-gradient(120deg, #0f0f1a, #1a1a2e);

  background-size: 300px 300px, 100% 100%, 100% 100%, 100% 100%;
  animation: bgScroll 40s linear infinite;
  will-change: transform;
  transform: translate(var(--mx,0px), var(--my,0px));
}

@keyframes bgScroll {
  from { transform: translate(0,0); }
  to   { transform: translate(300px,300px); }
}

/* ===== PARTICLES ===== */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.35;
  animation: drift linear infinite;
}

@keyframes drift {
  from { transform: translate(0,0); opacity: 0; }
  10% { opacity: 0.35; }
  to { transform: translate(240px,220px); opacity: 0; }
}

/* ===== DUST MOTES ===== */
.dust {
  position: absolute;
  width: 6px;
  height: 6px;
  background: radial-gradient(circle, rgba(255,255,255,.6), transparent 70%);
  border-radius: 50%;
  opacity: 0.25;
  animation: dustFloat linear infinite;
}

@keyframes dustFloat {
  from { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 0.25; }
  to { transform: translateY(-200px) translateX(60px); opacity: 0; }
}

/* ===== LAUNCHER ===== */
body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.launcher {
  width: 440px;
  padding: 26px;
  border-radius: 28px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  box-shadow: 0 25px 50px rgba(0,0,0,.35);
}

h1 {
  margin: 0 0 14px;
  color: var(--pink);
  transform: rotate(-2deg);
}

input {
  width: 100%;
  padding: 12px;
  font-size: 1.1em;
  border-radius: 14px;
  border: 3px dashed var(--pink);
  outline: none;
  margin-bottom: 12px;
}

.list {
  max-height: 260px;
  overflow-y: auto;
}

.game {
  padding: 12px 16px;
  margin-bottom: 8px;
  background: var(--yellow);
  border-radius: 14px;
  cursor: pointer;
  font-weight: bold;
  transition: transform .12s, box-shadow .12s;
}

.game:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 10px 20px rgba(0,0,0,.15);
}

.buttons {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

button {
  flex: 1;
  padding: 14px;
  font-size: 1.2em;
  border: none;
  border-radius: 22px;
  cursor: pointer;
}

.random { background: limegreen; }
.last { background: deepskyblue; }
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="particles" id="particles"></div>

<div class="launcher">
  <h1>🎲 CHAOS GAME LAUNCHER</h1>
  <input id="search" placeholder="Search your doom..." autocomplete="off">
  <div class="list" id="gameList"></div>
  <div class="buttons">
    <button class="random" onclick="randomGame()">🎲 Random</button>
    <button class="last" onclick="lastGame()">⏮ Last</button>
  </div>
</div>

<script>
/* ===== MOUSE PARALLAX ===== */
const bg = document.getElementById("bg");
document.addEventListener("mousemove", e => {
  const x = (e.clientX / innerWidth - 0.5) * 15;
  const y = (e.clientY / innerHeight - 0.5) * 15;
  bg.style.setProperty("--mx", `${x}px`);
  bg.style.setProperty("--my", `${y}px`);
});

/* ===== PARTICLES + DUST ===== */
const particles = document.getElementById("particles");

for (let i = 0; i < 40; i++) {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.top = Math.random() * 100 + "vh";
  p.style.animationDuration = 20 + Math.random() * 20 + "s";
  p.style.animationDelay = Math.random() * 10 + "s";
  particles.appendChild(p);
}

for (let i = 0; i < 25; i++) {
  const d = document.createElement("div");
  d.className = "dust";
  d.style.left = Math.random() * 100 + "vw";
  d.style.top = 100 + Math.random() * 50 + "vh";
  d.style.animationDuration = 30 + Math.random() * 30 + "s";
  d.style.animationDelay = Math.random() * 20 + "s";
  particles.appendChild(d);
}

/* ===== GAME LOGIC ===== */
let games = [];

fetch("games.json")
  .then(r => {
    if (!r.ok) throw new Error("Failed to load games.json");
    return r.json();
  })
  .then(list => {
    games = list;
    render();
  })
  .catch(err => {
    console.error(err);
    alert("Failed to load game list 😭");
  });

const listEl = document.getElementById("gameList");
const search = document.getElementById("search");

function cleanName(p) {
  p = p.split("/");
  let n = p.at(-1) === "index.html" ? p.at(-2) : p.at(-1).replace(".html","");
  return n.replace(/[-_]/g," ").replace(/\b\w/g,c=>c.toUpperCase());
}

function render(filter="") {
  listEl.innerHTML = "";
  games.filter(g => cleanName(g).toLowerCase().includes(filter))
       .forEach(g => {
         const div = document.createElement("div");
         div.className = "game";
         div.textContent = cleanName(g);
         div.onclick = () => launch(g);
         listEl.appendChild(div);
       });
}

function launch(path) {
  localStorage.setItem("lastGame", path);
  setTimeout(() => location.href = path, 300);
}

function randomGame() {
  launch(games[Math.floor(Math.random() * games.length)]);
}

function lastGame() {
  const last = localStorage.getItem("lastGame");
  last ? launch(last) : alert("No last game. Chaos uninitialized.");
}

search.addEventListener("input", e => render(e.target.value.toLowerCase()));

search.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const first = document.querySelector(".game");
    if (first) first.click();
  }
});

render();
</script>

</body>
</html>

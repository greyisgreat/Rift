<!DOCTYPE html>
<html>
<head>
    <title>Hades Project </title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameCanvas {
            border: 3px solid #333;
            background: #222;
            box-shadow: 0 0 20px rgba(255,107,107,0.3);
        }
        .controls {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        #debugInfo {
            background: #000;
            color: #0f0;
            padding: 15px;
            margin: 15px auto;
            text-align: left;
            font-family: 'Courier New', monospace;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 5px;
            border: 1px solid #333;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Map of Hades 🔥</h1>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <button id="paintWalkable" class="btn" style="background: #B97A57; color: white;">🟤 Paint Walkable</button>
            <button id="paintWall" class="btn" style="background: #ff4444; color: white;">🔴 Paint Wall</button>
            <button id="togglePaint" class="btn" style="background: #333; color: white;">🎨 Paint Mode: OFF</button>
            <button id="togglePath" class="btn" style="background: #00aa00; color: white;">🛤️ Show Path: ON</button>
            <button id="toggleQuests" class="btn" style="background: #9966cc; color: white;">📜 Quest Log</button>
            <button id="resetMap" class="btn" style="background: #666; color: white;">🔄 Reset Map</button>
        </div>
        
        <div id="debugInfo">
            🎮 Hades Project - Quest System Edition<br>
            Ready to initialize...
        </div>
    </div>

    <script>
        // ===== GAME SETUP =====
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Map canvas for collision detection
        const mapCanvas = document.createElement('canvas');
        mapCanvas.width = canvas.width;
        mapCanvas.height = canvas.height;
        const mapCtx = mapCanvas.getContext('2d');
        
        // Game constants
        const GRID_SIZE = 20;
        const GRID_WIDTH = Math.ceil(canvas.width / GRID_SIZE);
        const GRID_HEIGHT = Math.ceil(canvas.height / GRID_SIZE);
        const WALKABLE_COLOR = '#B97A57';
        
        // Quest System
        const questSystem = {
            activeQuests: [],
            completedQuests: [],
            availableQuests: [],
            showQuestLog: false,
            questLogScroll: 0,
            maxQuestLogHeight: 400,
            questPoints: [],
            playerLevel: 1,
            playerXP: 0,
            playerGold: 0
        };
        
        // Dialog system
        const dialogSystem = {
            active: false,
            currentDialog: [],
            currentPage: 0,
            currentChar: 0,
            typewriterSpeed: 50,
            lastTypeTime: 0,
            isTyping: false,
            canAdvance: false,
            boxHeight: 120,
            boxY: canvas.height - 140,
            nameBoxWidth: 150,
            nameBoxHeight: 40,
            speaker: '',
            textColor: '#ffffff',
            nameColor: '#ffaa00',
            boxColor: 'rgba(0, 0, 0, 0.9)',
            borderColor: '#ffffff',
            blinkTime: 0,
            showCursor: true,
            isQuestDialog: false,
            currentQuest: null,
            questChoices: [],
            selectedChoice: 0
        };
        
        // Quest definitions
        const questDefinitions = [
            {
                id: 'souls_lost',
                title: 'Lost Souls',
                description: 'Find and guide 3 lost souls back to their resting places.',
                objectives: [
                    { text: 'Find the first lost soul', completed: false, location: { x: 150, y: 450 } },
                    { text: 'Find the second lost soul', completed: false, location: { x: 650, y: 150 } },
                    { text: 'Find the third lost soul', completed: false, location: { x: 400, y: 350 } }
                ],
                rewards: { xp: 100, gold: 50, items: ['Soul Essence'] },
                giver: 'HADES',
                status: 'available',
                dialog: {
                    offer: [
                        "Mortal, I have a task that requires your... unique skills.",
                        "Three souls have wandered from their eternal rest.",
                        "They must be found and guided back to peace.",
                        "Will you accept this sacred duty?"
                    ],
                    accept: [
                        "Excellent. The lost souls appear as glowing orbs.",
                        "Simply walk near them to guide them home.",
                        "Complete this task, and you shall be rewarded.",
                        "May the shadows guide your path."
                    ],
                    decline: [
                        "Hmph. Perhaps you are not ready for such responsibility.",
                        "The souls will continue to wander...",
                        "Return when you find courage, mortal."
                    ],
                    complete: [
                        "Impressive work, mortal. The souls are at peace.",
                        "Your dedication to the underworld is... noted.",
                        "Accept these rewards as payment for your service."
                    ]
                }
            },
            {
                id: 'ancient_paths',
                title: 'Ancient Pathways',
                description: 'Explore all corners of the underworld map.',
                objectives: [
                    { text: 'Visit the Northern Chamber', completed: false, location: { x: 400, y: 100 } },
                    { text: 'Visit the Southern Depths', completed: false, location: { x: 400, y: 500 } },
                    { text: 'Visit the Eastern Halls', completed: false, location: { x: 700, y: 300 } },
                    { text: 'Visit the Western Gates', completed: false, location: { x: 100, y: 300 } }
                ],
                rewards: { xp: 75, gold: 30, items: ['Map Fragment'] },
                giver: 'HADES',
                status: 'available',
                dialog: {
                    offer: [
                        "The underworld holds many secrets, mortal.",
                        "Ancient pathways connect all realms of my domain.",
                        "I require someone to survey these forgotten routes.",
                        "Are you prepared for such an expedition?"
                    ],
                    accept: [
                        "Wise choice. Explore the four cardinal directions.",
                        "Each holds chambers of great importance.",
                        "Your pathfinding skills will serve you well.",
                        "Report back when all areas have been surveyed."
                    ],
                    decline: [
                        "The paths will remain unmapped then.",
                        "Perhaps another soul will prove more... adventurous."
                    ],
                    complete: [
                        "Outstanding! You have mapped my entire domain.",
                        "Few mortals possess such thorough dedication.",
                        "These rewards are well-earned, navigator."
                    ]
                }
            },
            {
                id: 'cerberus_treat',
                title: 'Cerberus\' Favorite',
                description: 'Find special treats for Cerberus, the three-headed guardian.',
                objectives: [
                    { text: 'Collect Bone Treats (0/5)', completed: false, count: 0, maxCount: 5 },
                    { text: 'Deliver treats to Cerberus', completed: false, location: { x: 600, y: 450 } }
                ],
                rewards: { xp: 125, gold: 75, items: ['Cerberus Collar', 'Guardian\'s Blessing'] },
                giver: 'HADES',
                status: 'available',
                dialog: {
                    offer: [
                        "Even the mighty Cerberus has... preferences.",
                        "My three-headed guardian grows restless without proper treats.",
                        "Bone treats are scattered throughout my realm.",
                        "Will you gather them for my faithful companion?"
                    ],
                    accept: [
                        "Cerberus will be pleased. Search thoroughly.",
                        "The bone treats glow with ethereal light.",
                        "Collect five, then bring them to my guardian.",
                        "Be warned - Cerberus can be... enthusiastic about treats."
                    ],
                    decline: [
                        "Cerberus will not be pleased with this news.",
                        "His howls will echo through eternity..."
                    ],
                    complete: [
                        "Cerberus is content once more. Well done.",
                        "The guardian's loyalty is not easily earned.",
                        "You have proven yourself worthy of great rewards."
                    ]
                }
            }
        ];
        
        // Game state
        const game = {
            player: {
                x: canvas.width / 2,
                y: canvas.height / 2,
                size: 15,
                speed: 4,
                rotation: 0,
                path: [],
                pathIndex: 0
            },
            hades: {
                x: 200,
                y: 200,
                width: 60,
                height: 80,
                lastInteractionTime: 0,
                cooldownDuration: 1000,
                dialogIndex: 0,
                hasQuest: true,
                currentQuestOffer: null
            },
            grid: [],
            moving: false,
            paintMode: false,
            currentPaintColor: WALKABLE_COLOR,
            isMouseDown: false,
            showPath: true,
            pathVisualization: [],
            initialized: false,
            collectibles: []
        };
        
        // Initialize quest system
        function initializeQuests() {
            questSystem.availableQuests = [...questDefinitions];
            
            // Create collectible items for quests
            createCollectibles();
            
            updateDebugInfo('📜 Quest system initialized with ' + questSystem.availableQuests.length + ' available quests');
        }
        
        function createCollectibles() {
            // Create bone treats for Cerberus quest
            const boneTreatLocations = [
                { x: 120, y: 150 }, { x: 680, y: 180 }, { x: 150, y: 480 },
                { x: 650, y: 480 }, { x: 400, y: 250 }
            ];
            
            boneTreatLocations.forEach((loc, index) => {
                game.collectibles.push({
                    id: `bone_treat_${index}`,
                    type: 'bone_treat',
                    x: loc.x,
                    y: loc.y,
                    collected: false,
                    questId: 'cerberus_treat'
                });
            });
            
            // Create lost souls
            const soulLocations = [
                { x: 150, y: 450 }, { x: 650, y: 150 }, { x: 400, y: 350 }
            ];
            
            soulLocations.forEach((loc, index) => {
                game.collectibles.push({
                    id: `lost_soul_${index}`,
                    type: 'lost_soul',
                    x: loc.x,
                    y: loc.y,
                    collected: false,
                    questId: 'souls_lost'
                });
            });
        }
        
        // Quest management functions
        function offerQuest(questId) {
            const quest = questSystem.availableQuests.find(q => q.id === questId);
            if (!quest) return;
            
            game.hades.currentQuestOffer = quest;
            dialogSystem.isQuestDialog = true;
            dialogSystem.currentQuest = quest;
            dialogSystem.questChoices = ['Accept Quest', 'Decline Quest'];
            dialogSystem.selectedChoice = 0;
            
            startDialog({
                speaker: quest.giver,
                pages: quest.dialog.offer
            });
        }
        
        function acceptQuest(quest) {
            questSystem.activeQuests.push({
                ...quest,
                status: 'active',
                startTime: Date.now()
            });
            
            questSystem.availableQuests = questSystem.availableQuests.filter(q => q.id !== quest.id);
            game.hades.currentQuestOffer = null;
            
            startDialog({
                speaker: quest.giver,
                pages: quest.dialog.accept
            });
            
            updateDebugInfo(`📜 Quest accepted: ${quest.title}`);
        }
        
        function declineQuest(quest) {
            game.hades.currentQuestOffer = null;
            
            startDialog({
                speaker: quest.giver,
                pages: quest.dialog.decline
            });
            
            updateDebugInfo(`📜 Quest declined: ${quest.title}`);
        }
        
        function checkQuestProgress() {
            questSystem.activeQuests.forEach(quest => {
                let allCompleted = true;
                
                quest.objectives.forEach(objective => {
                    if (!objective.completed) {
                        // Check location-based objectives
                        if (objective.location) {
                            const distance = Math.sqrt(
                                Math.pow(game.player.x - objective.location.x, 2) +
                                Math.pow(game.player.y - objective.location.y, 2)
                            );
                            
                            if (distance <= 30) {
                                objective.completed = true;
                                updateDebugInfo(`✅ Objective completed: ${objective.text}`);
                            }
                        }
                        
                        if (!objective.completed) {
                            allCompleted = false;
                        }
                    }
                });
                
                // Check if quest is complete
                if (allCompleted && quest.status === 'active') {
                    completeQuest(quest);
                }
            });
        }
        
        function completeQuest(quest) {
            quest.status = 'completed';
            quest.completedTime = Date.now();
            
            questSystem.completedQuests.push(quest);
            questSystem.activeQuests = questSystem.activeQuests.filter(q => q.id !== quest.id);
            
            // Give rewards
            questSystem.playerXP += quest.rewards.xp;
            questSystem.playerGold += quest.rewards.gold;
            
            // Check for level up
            const newLevel = Math.floor(questSystem.playerXP / 100) + 1;
            if (newLevel > questSystem.playerLevel) {
                questSystem.playerLevel = newLevel;
                updateDebugInfo(`🎉 Level up! You are now level ${questSystem.playerLevel}`);
            }
            
            updateDebugInfo(`🎉 Quest completed: ${quest.title}`);
            updateDebugInfo(`💰 Rewards: ${quest.rewards.xp} XP, ${quest.rewards.gold} Gold`);
            
            if (quest.rewards.items && quest.rewards.items.length > 0) {
                updateDebugInfo(`🎁 Items received: ${quest.rewards.items.join(', ')}`);
            }
        }
        
        function checkCollectibles() {
            game.collectibles.forEach(collectible => {
                if (collectible.collected) return;
                
                const distance = Math.sqrt(
                    Math.pow(game.player.x - collectible.x, 2) +
                    Math.pow(game.player.y - collectible.y, 2)
                );
                
                if (distance <= 25) {
                    collectible.collected = true;
                    
                    // Update quest progress
                    const relatedQuest = questSystem.activeQuests.find(q => q.id === collectible.questId);
                    if (relatedQuest) {
                        if (collectible.type === 'bone_treat') {
                            const objective = relatedQuest.objectives.find(obj => obj.text.includes('Bone Treats'));
                            if (objective) {
                                objective.count = (objective.count || 0) + 1;
                                objective.text = `Collect Bone Treats (${objective.count}/${objective.maxCount})`;
                                
                                if (objective.count >= objective.maxCount) {
                                    objective.completed = true;
                                }
                                
                                updateDebugInfo(`🦴 Bone treat collected! (${objective.count}/${objective.maxCount})`);
                            }
                        } else if (collectible.type === 'lost_soul') {
                            const objectiveIndex = parseInt(collectible.id.split('_')[2]);
                            if (relatedQuest.objectives[objectiveIndex]) {
                                relatedQuest.objectives[objectiveIndex].completed = true;
                                updateDebugInfo(`👻 Lost soul guided home!`);
                            }
                        }
                    }
                }
            });
        }
        
        // Dialog system functions
        function startDialog(dialogSet) {
            dialogSystem.active = true;
            dialogSystem.currentDialog = dialogSet.pages;
            dialogSystem.speaker = dialogSet.speaker;
            dialogSystem.currentPage = 0;
            dialogSystem.currentChar = 0;
            dialogSystem.isTyping = true;
            dialogSystem.canAdvance = false;
            dialogSystem.lastTypeTime = Date.now();
            dialogSystem.blinkTime = Date.now();
            
            game.moving = false;
            updateDebugInfo(`💬 Dialog started with ${dialogSet.speaker}`);
        }
        
        function updateDialog() {
            if (!dialogSystem.active) return;
            
            const currentTime = Date.now();
            
            if (dialogSystem.isTyping) {
                if (currentTime - dialogSystem.lastTypeTime >= dialogSystem.typewriterSpeed) {
                    dialogSystem.currentChar++;
                    dialogSystem.lastTypeTime = currentTime;
                    
                    const currentText = dialogSystem.currentDialog[dialogSystem.currentPage];
                    if (dialogSystem.currentChar >= currentText.length) {
                        dialogSystem.isTyping = false;
                        dialogSystem.canAdvance = true;
                    }
                }
            }
            
            if (currentTime - dialogSystem.blinkTime >= 500) {
                dialogSystem.showCursor = !dialogSystem.showCursor;
                dialogSystem.blinkTime = currentTime;
            }
        }
        
        function advanceDialog() {
            if (!dialogSystem.active) return false;
            
            if (dialogSystem.isTyping) {
                dialogSystem.currentChar = dialogSystem.currentDialog[dialogSystem.currentPage].length;
                dialogSystem.isTyping = false;
                dialogSystem.canAdvance = true;
                return true;
            }
            
            if (dialogSystem.canAdvance) {
                dialogSystem.currentPage++;
                
                if (dialogSystem.currentPage >= dialogSystem.currentDialog.length) {
                    // Check if this is a quest dialog
                    if (dialogSystem.isQuestDialog && game.hades.currentQuestOffer) {
                        showQuestChoices();
                        return true;
                    }
                    
                    // End dialog
                    dialogSystem.active = false;
                    dialogSystem.isQuestDialog = false;
                    dialogSystem.currentQuest = null;
                    updateDebugInfo('💬 Dialog ended');
                    return false;
                } else {
                    dialogSystem.currentChar = 0;
                    dialogSystem.isTyping = true;
                    dialogSystem.canAdvance = false;
                    dialogSystem.lastTypeTime = Date.now();
                    return true;
                }
            }
            
            return false;
        }
        
        function showQuestChoices() {
            dialogSystem.isQuestDialog = true;
            dialogSystem.canAdvance = false;
            dialogSystem.isTyping = false;
        }
        
        function handleQuestChoice(choice) {
            const quest = game.hades.currentQuestOffer;
            if (!quest) return;
            
            dialogSystem.isQuestDialog = false;
            
            if (choice === 0) { // Accept
                acceptQuest(quest);
            } else { // Decline
                declineQuest(quest);
            }
        }
        
        // Drawing functions
        function drawDialog() {
            if (!dialogSystem.active) return;
            
            ctx.save();
            
            const boxX = 20;
            const boxWidth = canvas.width - 40;
            
            // Draw main dialog box
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(boxX + 3, dialogSystem.boxY + 3, boxWidth, dialogSystem.boxHeight);
            
            ctx.fillStyle = dialogSystem.boxColor;
            ctx.fillRect(boxX, dialogSystem.boxY, boxWidth, dialogSystem.boxHeight);
            
            ctx.strokeStyle = dialogSystem.borderColor;
            ctx.lineWidth = 3;
            ctx.strokeRect(boxX, dialogSystem.boxY, boxWidth, dialogSystem.boxHeight);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(boxX + 5, dialogSystem.boxY + 5, boxWidth - 10, dialogSystem.boxHeight - 10);
            
            // Draw speaker name box
            if (dialogSystem.speaker) {
                const nameBoxX = boxX + 20;
                const nameBoxY = dialogSystem.boxY - dialogSystem.nameBoxHeight + 5;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(nameBoxX + 2, nameBoxY + 2, dialogSystem.nameBoxWidth, dialogSystem.nameBoxHeight);
                
                ctx.fillStyle = dialogSystem.boxColor;
                ctx.fillRect(nameBoxX, nameBoxY, dialogSystem.nameBoxWidth, dialogSystem.nameBoxHeight);
                
                ctx.strokeStyle = dialogSystem.borderColor;
                ctx.lineWidth = 3;
                ctx.strokeRect(nameBoxX, nameBoxY, dialogSystem.nameBoxWidth, dialogSystem.nameBoxHeight);
                
                ctx.fillStyle = dialogSystem.nameColor;
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(
                    dialogSystem.speaker,
                    nameBoxX + dialogSystem.nameBoxWidth / 2,
                    nameBoxY + dialogSystem.nameBoxHeight / 2 + 6
                );
            }
            
            // Draw quest choices if applicable
            if (dialogSystem.isQuestDialog && game.hades.currentQuestOffer) {
                drawQuestChoices(boxX, boxWidth);
            } else {
                // Draw regular dialog text
                const currentText = dialogSystem.currentDialog[dialogSystem.currentPage];
                const displayText = currentText.substring(0, dialogSystem.currentChar);
                
                ctx.fillStyle = dialogSystem.textColor;
                ctx.font = '18px Arial';
                ctx.textAlign = 'left';
                
                const maxWidth = boxWidth - 40;
                const lineHeight = 25;
                const words = displayText.split(' ');
                let line = '';
                let y = dialogSystem.boxY + 35;
                
                for (let i = 0; i < words.length; i++) {
                    const testLine = line + words[i] + ' ';
                    const metrics = ctx.measureText(testLine);
                    const testWidth = metrics.width;
                    
                    if (testWidth > maxWidth && i > 0) {
                        ctx.fillText(line, boxX + 20, y);
                        line = words[i] + ' ';
                        y += lineHeight;
                    } else {
                        line = testLine;
                    }
                }
                ctx.fillText(line, boxX + 20, y);
                
                // Draw cursor
                if (!dialogSystem.isTyping && dialogSystem.showCursor) {
                    const cursorX = boxX + boxWidth - 30;
                    const cursorY = dialogSystem.boxY + dialogSystem.boxHeight - 25;
                    
                    ctx.fillStyle = '#ffff00';
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';
                    
                    if (dialogSystem.currentPage < dialogSystem.currentDialog.length - 1) {
                        ctx.fillText('▼', cursorX, cursorY);
                    } else {
                        ctx.fillText('✕', cursorX, cursorY);
                    }
                }
                
                // Draw page indicator
                if (dialogSystem.currentDialog.length > 1) {
                    const pageText = `${dialogSystem.currentPage + 1}/${dialogSystem.currentDialog.length}`;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'right';
                    ctx.fillText(pageText, boxX + boxWidth - 10, dialogSystem.boxY + 15);
                }
            }
            
            ctx.restore();
        }
        
        function drawQuestChoices(boxX, boxWidth) {
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'left';
            
            const choiceY = dialogSystem.boxY + 40;
            const choiceSpacing = 35;
            
            dialogSystem.questChoices.forEach((choice, index) => {
                const y = choiceY + (index * choiceSpacing);
                const isSelected = index === dialogSystem.selectedChoice;
                
                // Draw selection indicator
                if (isSelected) {
                    ctx.fillStyle = '#ffff00';
                    ctx.fillText('❯ ', boxX + 20, y);
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = '#aaaaaa';
                }
                
                ctx.fillText(choice, boxX + 45, y);
            });
            
            // Draw instructions
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Use ↑↓ arrows to select, ENTER to confirm', boxX + boxWidth / 2, dialogSystem.boxY + dialogSystem.boxHeight - 10);
        }
        
        function drawQuestLog() {
            if (!questSystem.showQuestLog) return;
            
            ctx.save();
            
            const logX = 50;
            const logY = 50;
            const logWidth = canvas.width - 100;
            const logHeight = questSystem.maxQuestLogHeight;
            
            // Background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.95)';
            ctx.fillRect(logX, logY, logWidth, logHeight);
            
            // Border
            ctx.strokeStyle = '#9966cc';
            ctx.lineWidth = 3;
            ctx.strokeRect(logX, logY, logWidth, logHeight);
            
            // Title
            ctx.fillStyle = '#9966cc';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('📜 QUEST LOG 📜', logX + logWidth / 2, logY + 35);
            
            // Player stats
            ctx.fillStyle = '#ffaa00';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Level: ${questSystem.playerLevel} | XP: ${questSystem.playerXP} | Gold: ${questSystem.playerGold}`, logX + 20, logY + 65);
            
            let currentY = logY + 90;
            
            // Active quests
            if (questSystem.activeQuests.length > 0) {
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('🔥 ACTIVE QUESTS', logX + 20, currentY);
                currentY += 25;
                
                questSystem.activeQuests.forEach(quest => {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText(`• ${quest.title}`, logX + 30, currentY);
                    currentY += 20;
                    
                    ctx.fillStyle = '#cccccc';
                    ctx.font = '14px Arial';
                    ctx.fillText(quest.description, logX + 40, currentY);
                    currentY += 18;
                    
                    quest.objectives.forEach(objective => {
                        const status = objective.completed ? '✅' : '⏳';
                        ctx.fillStyle = objective.completed ? '#00ff00' : '#ffaa00';
                        ctx.fillText(`  ${status} ${objective.text}`, logX + 50, currentY);
                        currentY += 16;
                    });
                    
                    currentY += 10;
                });
            }
            
                       // Available quests
                       if (questSystem.availableQuests.length > 0) {
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('📋 AVAILABLE QUESTS', logX + 20, currentY);
                currentY += 25;
                
                questSystem.availableQuests.forEach(quest => {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText(`• ${quest.title}`, logX + 30, currentY);

        // ===== UTILITY FUNCTIONS =====
        function updateDebugInfo(message) {
            const debugDiv = document.getElementById('debugInfo');
            const timestamp = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `<span style="color: #666">[${timestamp}]</span> ${message}<br>`;

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rift</title>

<style>
:root {
  --pink:#ff5fa2;
}

/* ===== RESET ===== */
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Comic Sans MS", cursive;
  background: transparent;
}

/* ===== BACKGROUND (SPACE OVERHAUL) ===== */
.bg {
  position: fixed;
  inset: -50%;
  z-index: -2;
  pointer-events: none;

  background:
    radial-gradient(circle at 20% 30%, rgba(120,180,255,0.18), transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(180,90,255,0.12), transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 60%),
    linear-gradient(180deg, #05060a, #0a0f1f, #05060a);

  background-size: 100% 100%;
  animation: bgMove 60s linear infinite;
  transform: translate(var(--mx,0px), var(--my,0px));
}

/* subtle drifting galaxy */
@keyframes bgMove {
  0% { transform: translate(0,0); }
  100% { transform: translate(120px,80px); }
}

/* ===== PARTICLES ===== */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

/* stars */
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  opacity: .6;
  box-shadow: 0 0 6px rgba(180,220,255,0.6);
  animation: drift linear infinite;
}

@keyframes drift {
  from { transform: translate(0,0); opacity: 0; }
  10% { opacity: .7; }
  to { transform: translate(260px,180px); opacity: 0; }
}

/* dust nebula particles */
.dust {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(120,180,255,0.7), transparent 70%);
  opacity: .25;
  animation: dustFloat linear infinite;
}

@keyframes dustFloat {
  from { transform: translate(0,0); opacity: 0; }
  10% { opacity: .25; }
  to { transform: translate(80px,-240px); opacity: 0; }
}

/* ===== LAYOUT ===== */
body {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ===== LAUNCHER ===== */
.launcher {
  width: 420px;
  padding: 22px;
  border-radius: 26px;
  background: rgba(10,12,20,.75);
  backdrop-filter: blur(10px);
  box-shadow: 0 25px 60px rgba(0,0,0,.6);
  border: 1px solid rgba(120,180,255,0.15);
}

h1 {
  margin: 0 0 14px;
  color: #7cc7ff;
  text-shadow: 0 0 10px rgba(120,180,255,0.6);
  transform: rotate(-2deg);
}

input {
  width: 100%;
  padding: 12px;
  font-size: 1.05em;
  border-radius: 14px;
  border: 2px solid rgba(120,180,255,0.4);
  outline: none;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.05);
  color: white;
}

/* ===== GAME LIST ===== */
.list {
  max-height: 260px;
  overflow-y: auto;
  padding-right: 6px;
}

.list::-webkit-scrollbar {
  width: 6px;
}
.list::-webkit-scrollbar-thumb {
  background: rgba(120,180,255,0.3);
  border-radius: 10px;
}

.game {
  position: relative;
  padding: 10px 12px;
  margin: 4px 0;
  cursor: pointer;
  font-weight: 600;
  border-radius: 10px;
  transition: background .15s, transform .15s;
  color: #d6e9ff;
}

.game::before {
  content: "";
  position: absolute;
  left: 0;
  top: 20%;
  width: 4px;
  height: 60%;
  background: #7cc7ff;
  border-radius: 10px;
  opacity: 0;
  box-shadow: 0 0 10px #7cc7ff;
}

.game:hover {
  background: rgba(120,180,255,0.08);
  transform: translateX(4px);
}

.game:hover::before {
  opacity: 1;
}

/* ===== BUTTONS ===== */
.buttons {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

button {
  flex: 1;
  padding: 14px;
  font-size: 1.1em;
  font-weight: bold;
  border-radius: 22px;
  cursor: pointer;

  background: transparent;
  border: 2px solid rgba(120,180,255,0.6);
  color: #d6e9ff;

  transition: transform .12s, box-shadow .12s, background .12s;
}

.random { color: #7CFF9E; }
.last { color: #7cc7ff; }

button:hover {
  background: rgba(120,180,255,0.1);
  box-shadow: 0 0 18px rgba(120,180,255,0.5);
  transform: translateY(-2px);
}

button:active {
  transform: translateY(1px);
  box-shadow: 0 0 8px rgba(120,180,255,0.4);
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="particles" id="particles"></div>

<div class="launcher">
  <h1>⚡️ Rift</h1>
  <input id="search" placeholder="You Know How To Use A Search Bar Right?" autocomplete="off">
  <div class="list" id="gameList"></div>
  <div class="buttons">
    <button class="random" onclick="randomGame()">🎲 Random</button>
    <button class="last" onclick="lastGame()">⏮ Last</button>
  </div>
</div>

<script>
const bg = document.getElementById("bg");
addEventListener("mousemove", e => {
  bg.style.setProperty("--mx", (e.clientX / innerWidth - .5) * 15 + "px");
  bg.style.setProperty("--my", (e.clientY / innerHeight - .5) * 15 + "px");
});

const particles = document.getElementById("particles");

for (let i=0;i<40;i++) {
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.top=Math.random()*100+"vh";
  p.style.animationDuration=20+Math.random()*20+"s";
  p.style.animationDelay=Math.random()*10+"s";
  particles.appendChild(p);
}

for (let i=0;i<25;i++) {
  const d=document.createElement("div");
  d.className="dust";
  d.style.left=Math.random()*100+"vw";
  d.style.top=100+Math.random()*50+"vh";
  d.style.animationDuration=30+Math.random()*30+"s";
  d.style.animationDelay=Math.random()*20+"s";
  particles.appendChild(d);
}

let games=[];
const listEl=document.getElementById("gameList");
const search=document.getElementById("search");

fetch("games.json")
  .then(r=>r.json())
  .then(j=>{games=j;render();})
  .catch(()=>alert("Failed to load games 😭"));

function cleanName(p){
  p=p.split("/");
  let n=p.at(-1)==="index.html"?p.at(-2):p.at(-1).replace(".html","");
  return n.replace(/[-_]/g," ").replace(/\b\w/g,c=>c.toUpperCase());
}

function render(f=""){
  listEl.innerHTML="";
  games.filter(g=>cleanName(g).toLowerCase().includes(f))
    .forEach(g=>{
      const d=document.createElement("div");
      d.className="game";
      d.textContent=cleanName(g);
      d.onclick=()=>launch(g);
      listEl.appendChild(d);
    });
}

function launch(p){
  localStorage.setItem("lastGame",p);
  setTimeout(()=>location.href=p,200);
}

function randomGame(){
  launch(games[Math.floor(Math.random()*games.length)]);
}

function lastGame(){
  const l=localStorage.getItem("lastGame");
  l?launch(l):alert("Rift has no memory yet.");
}

search.addEventListener("input",e=>render(e.target.value.toLowerCase()));
search.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    const g=document.querySelector(".game");
    if(g) g.click();
  }
});
</script>

</body>
</html>

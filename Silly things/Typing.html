    #level { font-size: 18px; margin-bottom: 10px; }
    #text-to-type { font-size: 20px; margin-bottom: 10px; }
    #user-input {
      width: 100%;
      font-size: 18px;
      padding: 5px;
      border: 1px solid #0f0;
      background: #111;
      color: #0f0;
    }
    .correct { color: #0f0; }
    .incorrect { color: #f00; }

    const textDisplay = document.getElementById('text-to-type');
    const userInput = document.getElementById('user-input');
    const levelDisplay = document.getElementById('level');

    function generateText(count) {
      let t = [];
      for (let i = 0; i < count; i++) {
        t.push(words[Math.floor(Math.random() * words.length)]);
      }
      return t.join(' ');
    }

    function nextLevel() {
      levelDisplay.textContent = 'Level ' + level;
      currentText = generateText(5 + level);
      textDisplay.textContent = currentText;
      userInput.value = '';
    }

    userInput.addEventListener('input', e => {
      const val = userInput.value;
      let displayHTML = '';
      let finished = true;

      for (let i = 0; i < currentText.length; i++) {
        if (i < val.length) {
          const correct = val[i] === currentText[i];
          displayHTML += `<span class="${correct ? 'correct':'incorrect'}">${currentText[i]}</span>`;
          if (!correct) finished = false;
        } else {
          displayHTML += currentText[i];
          finished = false;
        }
      }

      textDisplay.innerHTML = displayHTML;

      // auto advance when done
      if (finished && val.length === currentText.length) {
        level++;
        setTimeout(nextLevel, 500);
      }
    });

    // hidden auto-glitch: occasionally delete a correct character
    setInterval(() => {
      if (Math.random() < errorChance && document.activeElement === userInput) {
        const v = userInput.value;
        if (v.length > 0) {
          userInput.value = v.slice(0, -1);
        }
      }
    }, 3000);
